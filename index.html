<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAB-DICE - Farb-Würfeltisch</title>
    
    <!-- Tailwind CSS für erstklassiges Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts für klare Typografie -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }
        
        /* Sanfte Drehanimation beim Würfeln */
        @keyframes dice-roll {
            0% { transform: scale(0.5) rotate(0deg); filter: blur(2px); }
            50% { transform: scale(1.1) rotate(180deg); filter: blur(1px); }
            100% { transform: scale(1) rotate(360deg); filter: blur(0); }
        }

        .animate-roll {
            animation: dice-roll 0.5s cubic-bezier(0.25, 1, 0.5, 1) both;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col justify-between p-4 selection:bg-indigo-500 selection:text-white">

    <header class="text-center pt-4 pb-2">
        <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
            SAB-DICE
        </h1>
        <p class="text-xs text-slate-400 mt-1">Dein privater Farb-Würfeltisch</p>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center gap-6 max-w-lg mx-auto w-full">
        
        <!-- Würfel-Bereich -->
        <div class="w-full bg-slate-900/50 border border-slate-800 rounded-3xl p-6 shadow-2xl flex flex-col items-center gap-6">
            
            <!-- Die 4 Würfel -->
            <div id="dice-grid" class="grid grid-cols-4 gap-3 w-full">
                <!-- Würfel 1 -->
                <div id="dice-0" onclick="rollSingle(0)" class="aspect-square bg-indigo-600 rounded-2xl shadow-lg cursor-pointer border border-white/10 active:scale-95 hover:scale-105 transition-all duration-200 relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-tr from-black/30 via-transparent to-white/30"></div>
                </div>
                <!-- Würfel 2 -->
                <div id="dice-1" onclick="rollSingle(1)" class="aspect-square bg-purple-600 rounded-2xl shadow-lg cursor-pointer border border-white/10 active:scale-95 hover:scale-105 transition-all duration-200 relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-tr from-black/30 via-transparent to-white/30"></div>
                </div>
                <!-- Würfel 3 -->
                <div id="dice-2" onclick="rollSingle(2)" class="aspect-square bg-pink-600 rounded-2xl shadow-lg cursor-pointer border border-white/10 active:scale-95 hover:scale-105 transition-all duration-200 relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-tr from-black/30 via-transparent to-white/30"></div>
                </div>
                <!-- Würfel 4 -->
                <div id="dice-3" onclick="rollSingle(3)" class="aspect-square bg-teal-600 rounded-2xl shadow-lg cursor-pointer border border-white/10 active:scale-95 hover:scale-105 transition-all duration-200 relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-tr from-black/30 via-transparent to-white/30"></div>
                </div>
            </div>

            <!-- Großer Würfel-Button -->
            <button onclick="rollAll()" class="w-full py-4 rounded-2xl bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 hover:from-indigo-600 hover:to-pink-600 text-white font-extrabold text-lg shadow-lg active:scale-95 transition-all tracking-wider">
                ALLE WÜRFELN
            </button>
        </div>

        <!-- Farben-Einstellung direkt darunter -->
        <div class="w-full bg-slate-900/50 border border-slate-800 rounded-3xl p-6 shadow-2xl">
            <h2 class="text-sm font-bold text-slate-300 mb-4 text-center uppercase tracking-wider">Welche Farben dürfen vorkommen?</h2>
            
            <!-- Einfache Farb-Schalter -->
            <div id="color-selectors" class="grid grid-cols-3 gap-2">
                <!-- Wird per JS befüllt -->
            </div>
            
            <button onclick="resetDice()" class="w-full mt-4 py-2 text-xs font-semibold bg-slate-800 hover:bg-slate-700 text-slate-400 rounded-xl transition-all">
                Zurücksetzen auf Standard
            </button>
        </div>

    </main>

    <footer class="text-center text-[10px] text-slate-500 py-4">
        Tipp: Tippe auf einen einzelnen Würfel, um nur diesen neu zu färben!
    </footer>

    <script>
        // Alle verfügbaren Farben
        const COLORS = {
            indigo: { name: 'Blau', bg: 'bg-indigo-600' },
            purple: { name: 'Violett', bg: 'bg-purple-600' },
            pink: { name: 'Pink', bg: 'bg-pink-600' },
            teal: { name: 'Mint', bg: 'bg-teal-600' },
            red: { name: 'Rot', bg: 'bg-rose-600' },
            orange: { name: 'Orange', bg: 'bg-orange-500' },
            emerald: { name: 'Grün', bg: 'bg-emerald-600' },
            yellow: { name: 'Gelb', bg: 'bg-yellow-500' },
            slate: { name: 'Grau', bg: 'bg-slate-600' }
        };

        // Standardmäßig aktive Farben im Topf
        let activeColors = ['indigo', 'purple', 'pink', 'teal', 'red', 'orange', 'emerald', 'yellow', 'slate'];

        // Aktueller Zustand der 4 Würfel
        const diceState = [
            { color: 'indigo' },
            { color: 'purple' },
            { color: 'pink' },
            { color: 'teal' }
        ];

        // Ton-Effekt fürs Würfeln (synthetischer Klick-Sound)
        let audioCtx = null;
        function playRollSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);
                
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.15);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(now);
                osc.stop(now + 0.15);
            } catch (e) {}
        }

        // Zeichnet einen Würfel mit seiner aktuellen Farbe
        function renderDice(index) {
            const diceEl = document.getElementById(`dice-${index}`);
            const colorKey = diceState[index].color;
            const colorClass = COLORS[colorKey] ? COLORS[colorKey].bg : 'bg-slate-600';
            
            diceEl.className = `aspect-square rounded-2xl shadow-lg cursor-pointer border border-white/10 active:scale-95 hover:scale-105 transition-all duration-200 relative overflow-hidden ${colorClass}`;
        }

        // Holt eine zufällige Farbe aus den erlaubten Farben
        function getRandomColor() {
            if (activeColors.length === 0) return 'slate';
            return activeColors[Math.floor(Math.random() * activeColors.length)];
        }

        // Einen einzelnen Würfel werfen
        function rollSingle(index) {
            const diceEl = document.getElementById(`dice-${index}`);
            
            // Animation starten
            diceEl.classList.remove('animate-roll');
            void diceEl.offsetWidth; // Trick zum Neustarten der CSS-Animation
            diceEl.classList.add('animate-roll');
            
            playRollSound();

            let counts = 0;
            const interval = setInterval(() => {
                diceState[index].color = getRandomColor();
                renderDice(index);
                counts++;
                if (counts > 6) {
                    clearInterval(interval);
                }
            }, 60);
        }

        // Alle 4 Würfel zusammen werfen
        function rollAll() {
            for (let i = 0; i < 4; i++) {
                setTimeout(() => {
                    rollSingle(i);
                }, i * 50); // Ganz leicht zeitversetzt für schöneres Aussehen
            }
        }

        // Zurücksetzen auf Standard-Farben
        function resetDice() {
            const defaults = ['indigo', 'purple', 'pink', 'teal'];
            diceState.forEach((state, i) => {
                state.color = defaults[i];
                renderDice(i);
            });
        }

        // Farbe an- oder ausschalten im Topf
        function toggleColor(key) {
            const index = activeColors.indexOf(key);
            if (index > -1) {
                // Mindestens eine Farbe muss an bleiben
                if (activeColors.length > 1) {
                    activeColors.splice(index, 1);
                }
            } else {
                activeColors.push(key);
            }
            renderSelectors();
        }

        // Zeichnet die Schalter für die Farben
        function renderSelectors() {
            const container = document.getElementById('color-selectors');
            container.innerHTML = '';

            Object.entries(COLORS).forEach(([key, value]) => {
                const isActive = activeColors.includes(key);
                const btn = document.createElement('button');
                btn.onclick = () => toggleColor(key);
                
                // Schickes aktives/inaktives Design
                btn.className = `flex items-center gap-2 p-2.5 rounded-xl text-xs font-semibold transition-all duration-150 border ${
                    isActive 
                    ? 'bg-slate-800 border-indigo-500/80 text-white scale-105 shadow-md shadow-indigo-500/10' 
                    : 'bg-slate-950/40 text-slate-500 border-transparent opacity-40 line-through'
                }`;

                // Der kleine farbige Punkt im Button
                const dot = document.createElement('span');
                dot.className = `w-3 h-3 rounded-full shrink-0 ${value.bg}`;
                
                btn.appendChild(dot);
                
                const label = document.createElement('span');
                label.innerText = value.name;
                btn.appendChild(label);
                
                container.appendChild(btn);
            });
        }

        // Starten beim Laden der Seite
        window.onload = function() {
            for (let i = 0; i < 4; i++) {
                renderDice(i);
            }
            renderSelectors();
        };
    </script>
</body>
</html>
```
